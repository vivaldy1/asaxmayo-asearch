<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>朔栖まよ🍼🎷アーカイブ検索</title>
  <link rel="icon" type="image/svg+xml" href="https://vivaldy1.github.io/asaxmayo-asearch/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
  <style>
    :root {
      --bg: #0d0c0a;
      --bg2: #141310;
      --bg3: #1c1a16;
      --gold: #c8a96e;
      --gold-dim: #8a6e3e;
      --gold-glow: rgba(200, 169, 110, 0.15);
      --text: #e8e0d0;
      --text-dim: #8a8070;
      --border: rgba(200, 169, 110, 0.2);
      --radius: 4px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: scroll
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(200, 169, 110, 0.06) 0%, transparent 70%), repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(255, 255, 255, 0.01) 80px, rgba(255, 255, 255, 0.01) 81px);
      pointer-events: none;
      z-index: 0
    }

    /* ===== Header ===== */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 48px 24px 32px;
      border-bottom: 1px solid var(--border)
    }

    .header-label {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      letter-spacing: .3em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp .8s .1s forwards
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 300;
      color: var(--gold);
      letter-spacing: .1em;
      line-height: 1.1;
      opacity: 0;
      animation: fadeUp .8s .2s forwards
    }

    h1 span {
      display: block;
      font-size: .45em;
      font-style: italic;
      color: var(--text-dim);
      letter-spacing: .2em;
      margin-top: 8px
    }

    /* ===== Page-level tabs ===== */
    .page-nav {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      border-bottom: 1px solid var(--border);
      opacity: 0;
      animation: fadeUp .8s .3s forwards
    }

    .page-tab {
      flex: 1;
      max-width: 200px;
      padding: 14px 8px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 300;
      cursor: pointer;
      letter-spacing: .08em;
      transition: all .2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px
    }

    .page-tab:hover {
      color: var(--text)
    }

    .page-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
      font-weight: 400
    }

    /* ===== Tab panels ===== */
    .tab-panel {
      display: none
    }

    .tab-panel.active {
      display: block
    }

    /* ===== Search section (shared styles) ===== */
    .search-section {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 24px 24px
    }

    .target-tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px
    }

    .target-tab {
      flex: 1;
      padding: 10px 6px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 300;
      cursor: pointer;
      border-radius: 2px;
      transition: all .2s;
      letter-spacing: .05em
    }

    .target-tab:hover {
      color: var(--text)
    }

    .target-tab.active {
      background: var(--gold);
      color: var(--bg);
      font-weight: 400
    }

    .search-bar {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .2s, box-shadow .2s
    }

    .search-bar:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow)
    }

    .search-bar input {
      flex: 1;
      padding: 16px 20px;
      background: var(--bg2);
      border: none;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 16px;
      font-weight: 300;
      outline: none;
      letter-spacing: .03em
    }

    .search-bar input::placeholder {
      color: var(--text-dim)
    }

    .search-bar button {
      padding: 16px 28px;
      background: var(--gold);
      border: none;
      color: var(--bg);
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      letter-spacing: .15em;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap
    }

    .search-bar button:hover {
      background: #dbbf80
    }

    .search-bar button:disabled {
      background: var(--gold-dim);
      cursor: not-allowed
    }

    .date-filter {
      margin-top: 12px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px
    }

    .date-filter label {
      font-size: 12px;
      color: var(--text-dim)
    }

    .date-preset {
      padding: 4px 12px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 100px;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      transition: all .2s;
      font-family: 'Noto Sans JP', sans-serif
    }

    .date-preset:hover,
    .date-preset.active {
      border-color: var(--gold-dim);
      color: var(--gold)
    }

    .date-inputs {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap
    }

    .date-input {
      padding: 4px 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      outline: none
    }

    .date-input:focus {
      border-color: var(--gold-dim)
    }

    .user-id-bar {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      align-items: center
    }

    .user-id-wrap {
      flex: 1;
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .2s
    }

    .user-id-wrap:focus-within {
      border-color: var(--gold-dim)
    }

    .user-id-prefix {
      padding: 8px 10px 8px 14px;
      background: var(--bg3);
      color: var(--gold-dim);
      font-size: 14px;
      display: flex;
      align-items: center;
      border-right: 1px solid var(--border);
      flex-shrink: 0
    }

    .user-id-input {
      flex: 1;
      padding: 8px 12px;
      background: var(--bg2);
      border: none;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 300;
      outline: none
    }

    .user-id-input::placeholder {
      color: var(--text-dim)
    }

    .clear-user-btn {
      padding: 8px 12px;
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      transition: color .15s;
      display: none
    }

    .clear-user-btn:hover {
      color: var(--gold)
    }

    .search-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      gap: 8px
    }

    .search-time {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: .05em
    }

    /* ===== Mod tab: direct list ===== */
    .mod-section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      color: var(--gold-dim);
      letter-spacing: .15em;
      margin-bottom: 12px;
      font-style: italic
    }

    .mod-direct-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 20px;
      max-height: 280px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px;
      background: var(--bg2)
    }

    .mod-direct-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .15s;
      user-select: none
    }

    .mod-direct-item:hover {
      background: var(--bg3)
    }

    .mod-direct-item.selected {
      background: var(--gold-glow);
      border: 1px solid var(--gold-dim)
    }

    .mod-item-role {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 100px;
      flex-shrink: 0
    }

    .mod-item-role.owner {
      border: 1px solid rgba(255, 210, 0, .5);
      color: #f0c840
    }

    .mod-item-role.moderator {
      border: 1px solid rgba(180, 100, 255, .4);
      color: #b464ff
    }

    .mod-item-user {
      font-size: 14px;
      color: var(--text);
      flex: 1
    }

    .mod-item-check {
      font-size: 16px;
      color: var(--gold);
      opacity: 0;
      transition: opacity .15s
    }

    .mod-direct-item.selected .mod-item-check {
      opacity: 1
    }

    .mod-keyword-row {
      margin-top: 4px
    }

    .mod-keyword-row input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s
    }

    .mod-keyword-row input:focus {
      border-color: var(--gold-dim)
    }

    .mod-keyword-row input::placeholder {
      color: var(--text-dim)
    }

    .mod-search-btn {
      margin-top: 10px;
      width: 100%;
      padding: 13px;
      background: var(--gold);
      border: none;
      border-radius: var(--radius);
      color: var(--bg);
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      letter-spacing: .15em;
      cursor: pointer;
      transition: background .2s
    }

    .mod-search-btn:hover {
      background: #dbbf80
    }

    .mod-search-btn:disabled {
      background: var(--gold-dim);
      cursor: not-allowed
    }

    .mod-selected-label {
      font-size: 12px;
      color: var(--gold);
      margin-top: 6px;
      min-height: 18px;
      letter-spacing: .05em
    }

    /* ===== Status & Results (shared) ===== */
    #status {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 12px;
      font-size: 13px;
      color: var(--text-dim);
      min-height: 40px;
      letter-spacing: .05em
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px
    }

    #results {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px 80px
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 0 16px;
      border-bottom: 1px solid var(--border)
    }

    .results-count {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: var(--gold)
    }

    .results-count span {
      font-style: italic
    }

    .results-meta {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: .05em
    }

    .video-group {
      border-bottom: 1px solid var(--border);
      padding: 24px 0;
      animation: fadeUp .4s both
    }

    .video-group-header {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 14px
    }

    .video-thumb {
      flex-shrink: 0;
      width: 120px;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg3)
    }

    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .video-info {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .video-date {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: .05em
    }

    .video-title-link {
      color: var(--gold);
      text-decoration: none;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.4;
      transition: color .15s;
      word-break: break-all
    }

    .video-title-link:hover {
      color: #dbbf80
    }

    .hit-row {
      display: flex;
      align-items: baseline;
      padding: 5px 0 5px 16px;
      border-left: 2px solid var(--border);
      margin-bottom: 3px;
      transition: border-color .15s
    }

    .hit-row:hover {
      border-left-color: var(--gold-dim)
    }

    .hit-ts {
      width: 72px;
      flex-shrink: 0;
      text-align: right;
      padding-right: 10px
    }

    .hit-ts a {
      color: var(--gold-dim);
      text-decoration: none;
      font-size: 12px;
      white-space: nowrap;
      font-family: monospace;
      transition: color .15s
    }

    .hit-ts a:hover {
      color: var(--gold)
    }

    .hit-source {
      width: 60px;
      flex-shrink: 0;
      text-align: center;
      padding: 1px 0;
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      margin-right: 10px
    }

    .hit-source.subtitles {
      border-color: rgba(100, 180, 255, .3);
      color: #7bb8e8
    }

    .hit-source.comments {
      border-color: rgba(150, 220, 150, .3);
      color: #8dcf8d
    }

    .hit-source.chat {
      border-color: rgba(220, 150, 100, .3);
      color: #d4956a
    }

    .hit-source.moderator {
      border-color: rgba(180, 100, 255, .4);
      color: #b464ff
    }

    .hit-source.superchat {
      border-color: rgba(255, 100, 100, .4);
      color: #ff6464;
      background: rgba(255, 100, 100, 0.05)
    }

    /* オーナー用 */
    .hit-text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      word-break: break-all;
      flex: 1
    }

    .hit-text mark {
      background: rgba(200, 169, 110, .3);
      color: var(--gold);
      border-radius: 2px;
      padding: 0 1px
    }

    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-dim)
    }

    .empty-state .icon {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      color: var(--border);
      display: block;
      margin-bottom: 16px
    }

    /* ===== 共有ボタン ===== */
    .share-btn {
      padding: 4px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      transition: all .2s;
      font-family: 'Noto Sans JP', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      flex-shrink: 0
    }

    .share-btn:hover {
      border-color: var(--gold-dim);
      color: var(--gold)
    }

    .share-btn-large {
      padding: 6px 16px;
      font-size: 12px
    }

    .truncation-note {
      font-size: 11px;
      color: var(--text);
      margin-top: auto;
      letter-spacing: .03em;
      margin-left: 8px;
      vertical-align: middle
    }

    .copy-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      background: var(--bg2);
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      padding: 9px 22px;
      border-radius: 100px;
      font-size: 13px;
      letter-spacing: .06em;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity .25s
    }

    .copy-toast.show {
      opacity: 1
    }

    /* ===== 管理タブ ===== */
    .admin-section {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 24px 80px
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 20px
    }

    .admin-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: var(--gold)
    }

    .admin-reload {
      padding: 6px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all .2s
    }

    .admin-reload:hover {
      border-color: var(--gold-dim);
      color: var(--gold)
    }

    .admin-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius)
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px
    }

    thead th {
      padding: 10px 14px;
      text-align: left;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--gold-dim);
      letter-spacing: .08em;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color .15s
    }

    thead th:hover {
      color: var(--text)
    }

    thead th.num {
      text-align: right
    }

    .sort-icon {
      font-size: 10px;
      margin-left: 6px;
      opacity: 0.2;
      transition: opacity .2s;
      display: inline-block;
    }

    th.active-sort .sort-icon {
      opacity: 1;
      color: var(--gold)
    }

    tbody tr {
      border-bottom: 1px solid rgba(200, 169, 110, 0.08);
      transition: background .15s
    }

    tbody tr:last-child {
      border-bottom: none
    }

    tbody tr:hover {
      background: var(--bg2)
    }

    td {
      padding: 6px 14px;
      vertical-align: middle;
      color: var(--text)
    }

    td.date {
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
      font-family: monospace
    }

    td.title a {
      color: var(--text);
      text-decoration: none;
      transition: color .15s;
      line-height: 1.4;
      display: block
    }

    td.title a:hover {
      color: var(--gold)
    }

    .admin-video-thumb {
      display: block;
      width: 120px;
      border-radius: 2px;
      overflow: hidden;
      background: var(--bg3);
    }

    .admin-video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    td.duration {
      font-family: monospace;
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap
    }

    td.num {
      text-align: right;
      font-family: monospace;
      white-space: nowrap
    }

    td.num.has-data {
      color: var(--text)
    }

    td.num.zero {
      color: var(--text-dim);
      opacity: .5
    }

    /* 管理画面のクリック可能セル */
    td.num.has-data {
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }

    td.num.has-data:hover {
      background: rgba(200, 169, 110, 0.15) !important;
      text-decoration: underline;
    }

    /* ===== モーダル (詳細表示用) ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(4px);
      z-index: 2000;
      display: none;
      /* 初期状態 */
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }

    .modal-container {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 900px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      animation: modalFadeIn 0.3s ease-out;
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title-wrap {
      min-width: 0;
    }

    .modal-type-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--gold-dim);
      color: var(--bg);
      margin-right: 8px;
      vertical-align: middle;
      text-transform: uppercase;
    }

    .modal-title {
      font-size: 16px;
      color: var(--gold);
      font-weight: 400;
      vertical-align: middle;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 24px;
      cursor: pointer;

    .modal-close:hover {

    .modal-body {

    .modal-loading {

    /* モーダル内のヒット行スタイル */
    .modal-item {
      padding: 12px 0;
      border-bottom: 1px solid rgba(200, 169, 110, 0.1);

    .modal-item:last-child {

    .modal-item-meta {
      display: flex;
      gap: 12px;

      margin-bottom: 4px;
      align-items: center;

    .modal-item-ts {
      color: var(--gold-dim);
      font-family: monospace;
    }

    .modal-item-ts-link {
      color: var(--gold-dim);
      font-family: monospace;
      text-decoration: none;
      transition: color .15s;
      cursor: pointer;
    }

    .modal-item-ts-link:hover {
      color: var(--gold);
      text-decoration: none;
    }

    .modal-item-author {
      color: var(--text-dim);
      font-weight: 400;
    }

    .modal-item-text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      word-break: break-all;
    }

    .badge-comments {
      color: #8dcf8d
    }

    .badge-chat {
      color: #d4956a
    }

    .badge-subs {
      color: #7bb8e8
    }

    .admin-summary {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap
    }

    .summary-card {
      flex: 1;
      min-width: 120px;
      padding: 14px 18px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius)
    }

    .summary-card-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: .1em;
      margin-bottom: 4px
    }

    .summary-card-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      color: var(--gold)
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    /* ===== 件数内訳テーブル ===== */
    .count-table {
      border-collapse: collapse;
      table-layout: fixed;
      width: 400px;
      font-family: 'Cormorant Garamond', serif;

      overflow: hidden;

    .count-table th,
    .count-table td {
      padding: 6px 0;
      width: 80px;
      text-align: center;

  </style>
</head>

<body>

  <header>
    <p class="header-label">Archive Search</p>
    <h1 style="cursor:pointer" onclick="location.href=location.pathname" title="ホームに戻る">朔栖まよ<span>配信アーカイブ検索</span></h1>
  </header>

  <!-- ===== ページ切り替えタブ ===== -->
  <nav class="page-nav">
    <button class="page-tab active" data-page="search">🔍 キーワード検索</button>
    <!-- ユーザー検索タブ: 非表示中（style="display:none"を消すと復活） -->
    <button class="page-tab" data-page="mod" style="display:none">👤 ユーザー検索</button>
    <button class="page-tab" data-page="admin">📋 動画一覧</button>
  </nav>

  <!-- ===== タブ: キーワード検索 ===== -->
  <div id="tab-search" class="tab-panel active">
    <section class="search-section">
      <div class="target-tabs">
        <button class="target-tab active" data-value="all">すべて</button>
        <button class="target-tab" data-value="comments">コメント</button>
        <button class="target-tab" data-value="chat">チャット</button>
        <button class="target-tab" data-value="subtitles">字幕</button>
      </div>
      <div class="search-bar">
        <input id="searchInput" type="text" placeholder="キーワードを入力..." autocomplete="off">
        <button id="searchBtn" onclick="doSearch()">Search</button>
      </div>
      <div class="date-filter">
        <label>期間：</label>
        <button class="date-preset active" data-months="0">すべて</button>
        <button class="date-preset" data-months="1">1ヵ月</button>
        <button class="date-preset" data-months="3">3ヵ月</button>
        <button class="date-preset" data-months="12">1年</button>
        <button class="date-preset" data-months="-1">1年より前</button>
        <div class="date-inputs">
          <span style="font-size:12px;color:var(--text-dim)">From</span>
          <input class="date-input" type="date" id="dateFrom">
          <span style="font-size:12px;color:var(--text-dim)">To</span>
          <input class="date-input" type="date" id="dateTo">
        </div>
      </div>
      <div class="search-footer">
        <div style="display:flex; align-items:center; gap:6px;">
          <span style="font-size:12px;color:var(--text-dim)">並び順：</span>
          <select id="sortOrderSearch" class="date-input">
            <option value="DESC">新しい順</option>
            <option value="ASC">古い順</option>
          </select>
        </div>
        <div style="display:flex; align-items:center; gap:6px; margin-left:12px;">
          <span style="font-size:12px;color:var(--text-dim)">検索モード：</span>
          <select id="searchMode" class="date-input">
            <option value="AND">AND検索</option>
            <option value="OR">OR検索</option>
          </select>
        </div>
        <span id="searchTime" class="search-time"></span>
      </div>
    </section>
  </div>

  <!-- ===== タブ: モデレーター検索 ===== -->
  <div id="tab-mod" class="tab-panel">
    <section class="search-section">
      <p class="mod-section-title">Moderator / Owner</p>
      <div id="modDirectList" class="mod-direct-list">
        <div style="padding:12px;font-size:13px;color:var(--text-dim)"><span class="spinner"></span>読み込み中...</div>
      </div>
      <div id="modSelectedLabel" class="mod-selected-label"></div>

      <div class="user-id-bar">
        <div class="user-id-wrap">
          <span class="user-id-prefix">@</span>
          <input id="modUserIdInput" class="user-id-input" type="text" placeholder="またはユーザーIDを直接入力" autocomplete="off">
          <button id="modClearUserBtn" class="clear-user-btn" onclick="clearModUserId()">✕</button>
        </div>
      </div>

      <div class="mod-keyword-row" style="margin-top:12px">
        <input id="modKeywordInput" type="text" placeholder="キーワード絞り込み（省略可）" autocomplete="off">
      </div>

      <div class="date-filter" style="margin-top:12px">
        <label>期間：</label>
        <button class="date-preset mod-date-preset active" data-months="0">すべて</button>
        <button class="date-preset mod-date-preset" data-months="1">1ヵ月</button>
        <button class="date-preset mod-date-preset" data-months="3">3ヵ月</button>
        <button class="date-preset mod-date-preset" data-months="12">1年</button>
        <button class="date-preset mod-date-preset" data-months="-1">1年より前</button>
        <div class="date-inputs">
          <span style="font-size:12px;color:var(--text-dim)">From</span>
          <input class="date-input" type="date" id="modDateFrom">
          <span style="font-size:12px;color:var(--text-dim)">To</span>
          <input class="date-input" type="date" id="modDateTo">
        </div>
      </div>

      <button id="modSearchBtn" class="mod-search-btn" onclick="doModSearch()">Search</button>

      <div class="search-footer">
        <div style="display:flex; align-items:center; gap:6px;">
          <span style="font-size:12px;color:var(--text-dim)">並び順：</span>
          <select id="sortOrderMod" class="date-input">
            <option value="DESC">新しい順</option>
            <option value="ASC">古い順</option>
          </select>
        </div>
        <span id="modSearchTime" class="search-time"></span>
      </div>
    </section>
  </div>

  <!-- ===== タブ: 管理 ===== -->
  <div id="tab-admin" class="tab-panel">
    <div class="admin-section">
      <div class="admin-header">
        <span class="admin-title">動画一覧</span>
        <button class="admin-reload" onclick="loadAdminData()">↺ 再読み込み</button>
      </div>
      <div id="adminSummary" class="admin-summary"></div>
      <div id="adminContent">
        <div style="text-align:center;padding:60px;color:var(--text-dim)">タブを開くと自動読み込みされます</div>
      </div>
    </div>
  </div>

  <div id="status"></div>
  <div id="results"></div>

  <!-- コピー完了トースト -->
  <div id="copyToast" class="copy-toast">🔗 URLをコピーしました</div>

  <!-- ハイライトグラフモーダル -->
  <div id="highlightModal" class="modal-overlay" onclick="if(event.target===this) closeHighlightModal()">
    <div class="modal-container" style="max-width: 800px;">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <span class="modal-type-badge" style="background:var(--gold)">グラフ</span>
          <span id="highlightModalTitle" class="modal-title"></span>
        </div>
        <button class="modal-close" onclick="closeHighlightModal()">×</button>
      </div>
      <div id="highlightModalControls" style="padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 20px; align-items: center; background: var(--bg3);">
        <div style="display:flex; align-items:center; gap:6px;">
          <label style="font-size:12px;color:var(--text-dim);">集計間隔：</label>
          <select id="highlightIntervalSelect" class="date-input" style="padding:4px 8px;font-size:13px;" onchange="renderHighlightChart()">
            <option value="60">1分</option>
            <option value="120" selected>2分</option>
            <option value="300">5分</option>
            <option value="600">10分</option>
          </select>
        </div>
        <div style="display:flex; align-items:center; gap:6px;">
          <label style="font-size:12px;color:var(--text-dim);">グラフ種類：</label>
          <select id="highlightTypeSelect" class="date-input" style="padding:4px 8px;font-size:13px;" onchange="renderHighlightChart()">
            <option value="line" selected>折れ線グラフ</option>
            <option value="bar">棒グラフ</option>
          </select>
        </div>
        <button class="share-btn" style="margin-left:auto;" onclick="if(chartInstance) chartInstance.resetZoom()" title="グラフの拡大表示を元に戻す">🔍 リセット</button>
      </div>
      <div id="highlightModalBody" class="modal-body" style="height: 400px; display:flex; align-items:center; justify-content:center;">
        <canvas id="highlightChartCtx" style="display:none;"></canvas>
      </div>
    </div>
  </div>

  <!-- 詳細モーダル -->
  <div id="detailModal" class="modal-overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal-container">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <span id="modalType" class="modal-type-badge"></span>
          <span id="modalTitle" class="modal-title"></span>
        </div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script>
    const WORKERS_URL = 'https://loan-memo-api.urud08-u.workers.dev';
    const LIMIT = 200;

    async function d1Action(action, params = {}) {
      const t0 = performance.now();
      const res = await fetch(WORKERS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, params }),
      });
      const t1 = performance.now();
      if (!res.ok) throw new Error(`Workers error: ${res.status} ${res.statusText}`);
      const text = await res.text();
      const t2 = performance.now();
      const data = JSON.parse(text);
      if (data && data.error) throw new Error(`D1 error: ${data.error}`);
      return data;
    }

    // ===== ページタブ切り替え =====
    let currentPage = 'search';
    let adminLoaded = false;
    let modDirectLoaded = false;

    document.querySelectorAll('.page-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const page = btn.dataset.page;
        if (page === currentPage) return;
        currentPage = page;
        document.querySelectorAll('.page-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(`tab-${page}`).classList.add('active');

        const sharedArea = document.getElementById('status');
        const resultsArea = document.getElementById('results');
        if (page === 'admin') {
          sharedArea.style.display = 'none';
          resultsArea.style.display = 'none';
          if (!adminLoaded) loadAdminData();
        } else {
          sharedArea.style.display = '';
          resultsArea.style.display = '';
          if (page === 'mod' && !modDirectLoaded) loadModDirectList();
        }
      });
    });

    // ===== コンテンツタブ (検索対象) 中揃え対応済 =====
    let currentTarget = 'all';
    document.querySelectorAll('.target-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.target-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTarget = btn.dataset.value;
      });
    });

    // ===== キーワード検索: Enter キー =====
    document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    // ===== 期間フィルタ (1年より前を追加) =====
    let dateFromVal = '', dateToVal = '';
    let modDateFromVal = '', modDateToVal = '';

    document.querySelectorAll('.date-preset').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const months = parseInt(btn.dataset.months);

        const to = new Date(), from = new Date();
        if (months === 0) {
          dateFromVal = ''; dateToVal = '';
        } else if (months === -1) {
          // 1年より前
          to.setFullYear(to.getFullYear() - 1);
          dateFromVal = '';
          dateToVal = to.toISOString().split('T')[0];
        } else {
          from.setMonth(from.getMonth() - months);
          dateFromVal = from.toISOString().split('T')[0];
          dateToVal = to.toISOString().split('T')[0];
        }

        document.getElementById('dateFrom').value = dateFromVal;
        document.getElementById('dateTo').value = dateToVal;
      });
    });

    document.getElementById('dateFrom').addEventListener('change', e => {
      dateFromVal = e.target.value;
      document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
    });
    document.getElementById('dateTo').addEventListener('change', e => {
      dateToVal = e.target.value;
      document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
    });

    // ===== ユーザー検索タブ: 期間フィルタ =====
    document.querySelectorAll('.mod-date-preset').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mod-date-preset').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const months = parseInt(btn.dataset.months);
        const to = new Date(), from = new Date();
        if (months === 0) {
          modDateFromVal = ''; modDateToVal = '';
        } else if (months === -1) {
          to.setFullYear(to.getFullYear() - 1);
          modDateFromVal = '';
          modDateToVal = to.toISOString().split('T')[0];
        } else {
          from.setMonth(from.getMonth() - months);
          modDateFromVal = from.toISOString().split('T')[0];
          modDateToVal = to.toISOString().split('T')[0];
        }
        document.getElementById('modDateFrom').value = modDateFromVal;
        document.getElementById('modDateTo').value = modDateToVal;
      });
    });

    document.getElementById('modDateFrom').addEventListener('change', e => {
      modDateFromVal = e.target.value;
      document.querySelectorAll('.mod-date-preset').forEach(b => b.classList.remove('active'));
    });
    document.getElementById('modDateTo').addEventListener('change', e => {
      modDateToVal = e.target.value;
      document.querySelectorAll('.mod-date-preset').forEach(b => b.classList.remove('active'));
    });

    // ===== 日付順ソート取得用 =====
    function getSortOrder() {
      return currentPage === 'mod' ? document.getElementById('sortOrderMod').value : document.getElementById('sortOrderSearch').value;
    }

    // ===== モデレーター直接リスト =====
    let modDirectCache = [];
    let selectedModUser = '';

    async function loadModDirectList() {
      const listEl = document.getElementById('modDirectList');
      listEl.innerHTML = '<div style="padding:12px;font-size:13px;color:var(--text-dim)"><span class="spinner"></span>読み込み中...</div>';
      try {
        const rows = await d1Action('get_mod_users');
        modDirectCache = rows.map(r => ({ user: r.author, role: r.role }));
        modDirectLoaded = true;
        renderModDirectList();
      } catch (e) {
        listEl.innerHTML = `<div style="padding:12px;font-size:13px;color:#e88">読み込みに失敗: ${escHtml(e.message)}</div>`;
      }
    }

    function renderModDirectList() {
      const listEl = document.getElementById('modDirectList');
      if (!modDirectCache.length) {
        listEl.innerHTML = '<div style="padding:12px;font-size:13px;color:var(--text-dim)">モデレーターが見つかりません</div>';
        return;
      }
      listEl.innerHTML = '';
      modDirectCache.forEach(({ user, role }) => {
        const item = document.createElement('div');
        item.className = 'mod-direct-item' + (selectedModUser === user ? ' selected' : '');
        item.dataset.user = user;
        item.innerHTML = `
        <span class="mod-item-role ${role.toLowerCase()}">${role === 'OWNER' ? 'OWNER' : 'MOD'}</span>
        <span class="mod-item-user">${escHtml(user)}</span>
        <span class="mod-item-check">✓</span>`;
        item.onclick = () => {
          if (selectedModUser === user) {
            selectedModUser = '';
            document.getElementById('modUserIdInput').value = '';
          } else {
            selectedModUser = user;
            document.getElementById('modUserIdInput').value = user;
          }
          updateModUI();
          renderModDirectList();
        };
        listEl.appendChild(item);
      });
    }

    function clearModUserId() {
      selectedModUser = '';
      document.getElementById('modUserIdInput').value = '';
      updateModUI();
      renderModDirectList();
    }

    document.getElementById('modUserIdInput').addEventListener('input', e => {
      selectedModUser = '';
      updateModUI();
      renderModDirectList();
    });

    document.getElementById('modKeywordInput').addEventListener('keydown', e => { if (e.key === 'Enter') doModSearch(); });

    function updateModUI() {
      const val = document.getElementById('modUserIdInput').value.trim() || selectedModUser;
      document.getElementById('modClearUserBtn').style.display = val ? 'block' : 'none';
      document.getElementById('modSelectedLabel').textContent = selectedModUser ? `選択中: ${selectedModUser}` : '';
    }

    // ===== かな正規化ユーティリティ =====
    // 半角カタカナ→全角カタカナ（濁点・半濁点の合成も処理）
    function hankakuToZenkaku(str) {
      // 濁点付き
      str = str.replace(/([ｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾊﾋﾌﾍﾎｳ])ﾞ/g, (_, c) => {
        const b = 'ｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾊﾋﾌﾍﾎｳ';
        const v = 'ガギグゲゴザジズゼゾダヂヅデドバビブベボヴ';
        const i = b.indexOf(c); return i >= 0 ? v[i] : c + '゛';
      });
      // 半濁点付き
      str = str.replace(/([ﾊﾋﾌﾍﾎ])ﾟ/g, (_, c) => {
        const b = 'ﾊﾋﾌﾍﾎ'; const v = 'パピプペポ';
        const i = b.indexOf(c); return i >= 0 ? v[i] : c + '゜';
      });
      // 残りの半角カタカナ→全角
      const hw = 'ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ';
      const fw = 'ヲァィゥェォャュョッーアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン';
      return str.replace(/[ｦ-ﾝ]/g, c => { const i = hw.indexOf(c); return i >= 0 ? fw[i] : c; });
    }
    function hiraganaToKatakana(str) {
      return str.replace(/[ぁ-ゖ]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60));
    }
    function katakanaToHiragana(str) {
      return str.replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
    }
    // キーワード1語 → かな表記バリアント配列（重複除去）
    function expandKana(kw) {
      const full = hankakuToZenkaku(kw);
      const kata = hiraganaToKatakana(full);
      const hira = katakanaToHiragana(full);
      return [...new Set([kw, full, kata, hira].filter(Boolean))];
    }
    // スペース区切りの入力文字列 → keywordGroups（バリアント展開済み）
    function buildKeywordGroups(raw) {
      return raw.replace(/　/g, ' ').split(/\s+/).filter(k => k.length > 0).map(expandKana);
    }

    // ===== D1 検索共通 =====
    function getSearchMode() {
      const el = document.getElementById('searchMode');
      return el ? el.value : 'AND';
    }

    async function searchSubtitles(kw) {
      const order = getSortOrder();
      const mode = getSearchMode();
      const keywordGroups = buildKeywordGroups(kw);

      const rows = await d1Action('search_subtitles', {
        keywordGroups, mode,
        dateFrom: dateFromVal || undefined,
        dateTo: dateToVal || undefined,
        order, limit: LIMIT,
      });
      const arr = rows.map(r => ({ source: 'Subtitles', date: r.date, videoId: r.video_id, title: r.title, timestamp: r.timestamp, role: '', user: '', text: r.text }));
      arr.truncated = rows.length >= LIMIT;
      arr.source = 'subtitles';
      return arr;
    }

    async function searchComments(kw) {
      const order = getSortOrder();
      const mode = getSearchMode();
      const keywordGroups = buildKeywordGroups(kw);

      const rows = await d1Action('search_comments', {
        keywordGroups, mode,
        dateFrom: dateFromVal || undefined,
        dateTo: dateToVal || undefined,
        order, limit: LIMIT,
      });
      const arr = rows.map(r => ({ source: 'Comments', date: r.date, videoId: r.video_id, title: r.title, timestamp: '', role: '', user: r.author, text: r.comment }));
      arr.truncated = rows.length >= LIMIT;
      arr.source = 'comments';
      return arr;
    }

    async function searchLiveChat(kw, userId, dateFrom, dateTo) {
      const order = getSortOrder();
      const mode = getSearchMode();
      const keywordGroups = kw ? buildKeywordGroups(kw) : [];
      const fromVal = dateFrom !== undefined ? dateFrom : dateFromVal;
      const toVal   = dateTo   !== undefined ? dateTo   : dateToVal;

      const rows = await d1Action('search_live_chats', {
        keywordGroups, mode,
        dateFrom: fromVal || undefined,
        dateTo: toVal || undefined,
        order, limit: LIMIT,
        userId: userId || undefined,
      });
      const arr = rows.map(r => ({ source: 'Live Chat', date: r.date, videoId: r.video_id, title: r.title, timestamp: r.timestamp, role: r.role, user: r.author, text: r.message, type: r.type }));
      arr.truncated = rows.length >= LIMIT;
      arr.source = 'chat';
      return arr;
    }

    // ===== キーワード検索実行 =====
    async function doSearch() {
      const keyword = document.getElementById('searchInput').value.trim();
      if (!keyword) { setStatus('キーワードを入力してください'); return; }

      document.getElementById('searchBtn').disabled = true;
      const timeEl = document.getElementById('searchTime');
      timeEl.textContent = '';
      setStatus('<span class="spinner"></span>検索中...');
      document.getElementById('results').innerHTML = '';

      const startTime = performance.now();
      try {
        const queries = [];
        if (currentTarget === 'all' || currentTarget === 'subtitles') queries.push(searchSubtitles(keyword));
        if (currentTarget === 'all' || currentTarget === 'comments') queries.push(searchComments(keyword));
        if (currentTarget === 'all' || currentTarget === 'chat') queries.push(searchLiveChat(keyword, ''));
        const settled = await Promise.allSettled(queries);
        let results = [];
        const truncatedSources = [];
        settled.forEach(r => {
          if (r.status === 'fulfilled') {
            results.push(...r.value);
            if (r.value.truncated) truncatedSources.push(r.value.source);
          }
        });

        const finalTime = `⏱ ${((performance.now() - startTime) / 1000).toFixed(2)}秒`;

        const order = getSortOrder();
        results.sort((a, b) => order === 'DESC' ? safeDateValue(b.date) - safeDateValue(a.date) : safeDateValue(a.date) - safeDateValue(b.date));

        updateUrlParams();
        renderResults(results, keyword, '', finalTime, truncatedSources);
      } catch (err) {
        setStatus(`エラー: ${err.message}`);
      } finally {
        document.getElementById('searchBtn').disabled = false;
      }
    }

    // ===== モデレーター検索実行 =====
    async function doModSearch() {
      const rawUser = document.getElementById('modUserIdInput').value.trim() || selectedModUser;
      const userId = rawUser ? (rawUser.startsWith('@') ? rawUser : '@' + rawUser) : '';
      const keyword = document.getElementById('modKeywordInput').value.trim();

      if (!userId && !keyword) { setStatus('モデレーターを選択するか、ユーザーIDを入力してください'); return; }

      document.getElementById('modSearchBtn').disabled = true;
      const timeEl = document.getElementById('modSearchTime');
      timeEl.textContent = '';
      setStatus('<span class="spinner"></span>検索中...');
      document.getElementById('results').innerHTML = '';

      const startTime = performance.now();
      try {
        const chatArr = await searchLiveChat(keyword, userId, modDateFromVal, modDateToVal);
        const finalTime = `⏱ ${((performance.now() - startTime) / 1000).toFixed(2)}秒`;
        const truncatedSources = chatArr.truncated ? ['chat'] : [];
        updateUrlParams();
        renderResults(chatArr, keyword, userId, finalTime, truncatedSources);
      } catch (err) {
        setStatus(`エラー: ${err.message}`);
      } finally {
        document.getElementById('modSearchBtn').disabled = false;
      }
    }

    function setStatus(html) { document.getElementById('status').innerHTML = html; }

    // ===== URL パラメータ管理 =====
    function buildCurrentParams() {
      const p = new URLSearchParams();
      p.set('tab', currentPage);
      if (currentPage === 'search') {
        p.set('target', currentTarget);
        const q = document.getElementById('searchInput').value.trim();
        if (q) p.set('q', q);
        if (dateFromVal) p.set('from', dateFromVal);
        if (dateToVal) p.set('to', dateToVal);
        p.set('sort', document.getElementById('sortOrderSearch').value);
        p.set('mode', document.getElementById('searchMode').value);
      } else if (currentPage === 'mod') {
        const user = document.getElementById('modUserIdInput').value.trim() || selectedModUser;
        if (user) p.set('user', user.replace(/^@/, ''));
        const kw = document.getElementById('modKeywordInput').value.trim();
        if (kw) p.set('q', kw);
        if (modDateFromVal) p.set('from', modDateFromVal);
        if (modDateToVal)   p.set('to',   modDateToVal);
        p.set('sort', document.getElementById('sortOrderMod').value);
      }
      return p;
    }

    function updateUrlParams() {
      const p = buildCurrentParams();
      history.replaceState(null, '', `${location.pathname}?${p.toString()}`);
    }

    function getShareUrl(overrides = {}) {
      const p = buildCurrentParams();
      Object.entries(overrides).forEach(([k, v]) => p.set(k, v));
      return `${location.origin}${location.pathname}?${p.toString()}`;
    }

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
      }
    }

    let toastTimer = null;
    function showToast(msg = '🔗 URLをコピーしました') {
      const el = document.getElementById('copyToast');
      el.textContent = msg;
      el.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
    }

    async function shareCurrentSearch(btn) {
      const url = getShareUrl();
      await copyToClipboard(url);
      showToast();
    }

    async function shareVideoSearch(dateStr, btn) {
      // dateStr は YYYY-MM-DD 形式
      const url = getShareUrl({ from: dateStr, to: dateStr });
      await copyToClipboard(url);
      showToast();
    }

    // ===== URLパラメータ適用（ページ読み込み時）=====
    function applyUrlParams() {
      const p = new URLSearchParams(location.search);
      if (!p.toString()) return; // パラメータ無しなら何もしない

      const tab = p.get('tab') || 'search';
      if (['search', 'mod', 'admin'].includes(tab) && tab !== currentPage) {
        const tabBtn = document.querySelector(`.page-tab[data-page="${tab}"]`);
        if (tabBtn) tabBtn.click();
      }

      if (tab === 'search') {
        const target = p.get('target') || 'all';
        document.querySelectorAll('.target-tab').forEach(b => {
          b.classList.toggle('active', b.dataset.value === target);
        });
        currentTarget = target;

        const q = p.get('q') || '';
        document.getElementById('searchInput').value = q;

        const from = p.get('from') || '';
        const to = p.get('to') || '';
        if (from) { dateFromVal = from; document.getElementById('dateFrom').value = from; }
        if (to)   { dateToVal = to;   document.getElementById('dateTo').value = to;   }
        if (from || to) document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));

        const sort = p.get('sort');
        if (sort) document.getElementById('sortOrderSearch').value = sort;
        const mode = p.get('mode');
        if (mode) document.getElementById('searchMode').value = mode;

        if (q) doSearch();
      } else if (tab === 'mod') {
        const user = p.get('user') || '';
        if (user) {
          selectedModUser = user;
          document.getElementById('modUserIdInput').value = user;
          updateModUI();
        }
        const q = p.get('q') || '';
        if (q) document.getElementById('modKeywordInput').value = q;
        const from = p.get('from') || '';
        const to   = p.get('to')   || '';
        if (from) { modDateFromVal = from; document.getElementById('modDateFrom').value = from; }
        if (to)   { modDateToVal   = to;   document.getElementById('modDateTo').value   = to;   }
        if (from || to) document.querySelectorAll('.mod-date-preset').forEach(b => b.classList.remove('active'));
        const sort = p.get('sort');
        if (sort) document.getElementById('sortOrderMod').value = sort;
        if (user || q) {
          // モデレーターリストをロードしてから検索
          if (!modDirectLoaded) loadModDirectList().then(() => doModSearch());
          else doModSearch();
        }
      }
    }

    // DOMContentLoaded 後にURLパラメータを適用
    document.addEventListener('DOMContentLoaded', applyUrlParams);

    // ===== 結果描画 =====
    function renderResults(results, keyword, userId = '', timeStr = '', truncatedSources = []) {
      setStatus('');
      const container = document.getElementById('results');
      if (!results.length) {
        container.innerHTML = `<div class="empty-state"><span class="icon">♪</span>見つかりませんでした</div>`;
        return;
      }

      // まとめる
      const order = getSortOrder();
      const groups = [], groupMap = {};
      results.forEach(item => {
        if (!groupMap[item.videoId]) {
          const g = { videoId: item.videoId, date: item.date, title: item.title, hits: [] };
          groups.push(g); groupMap[item.videoId] = g;
        }
        groupMap[item.videoId].hits.push(item);
      });

      // Group自体のソートを保証
      groups.sort((a, b) => order === 'DESC' ? safeDateValue(b.date) - safeDateValue(a.date) : safeDateValue(a.date) - safeDateValue(b.date));
      groups.forEach(g => g.hits.sort((a, b) => toSeconds(a.timestamp) - toSeconds(b.timestamp)));

      const metaParts = [];
      if (keyword) metaParts.push(`「${escHtml(keyword)}」`);
      if (userId) metaParts.push(`👤 ${escHtml(userId)}`);

      let metaHtml = metaParts.length > 0 ? metaParts.join(' <span style="margin:0 6px;opacity:0.3">/</span> ') : '';
      if (timeStr) {
        metaHtml += (metaHtml ? ' <span style="margin:0 6px;opacity:0.3">/</span> ' : '') + `<span style="color:var(--gold-dim);font-family:monospace;">${timeStr}</span>`;
      }

      // ソース別件数
      const isUserSearch = !!userId;
      const cntComments  = results.filter(r => r.source === 'Comments').length;
      const cntChat      = results.filter(r => r.source === 'Live Chat').length;
      const cntSubtitles = results.filter(r => r.source === 'Subtitles').length;
      const cntTotal     = results.length;

      const truncMark = s => truncatedSources.includes(s)
        ? `<span class="truncation-note" title="表示件数が上限に達したため、一部が省略されています"> ⚠</span>` : '';
      const truncAnyHtml = truncatedSources.length > 0
        ? `<span class="truncation-note" title="表示件数が上限に達したため、一部が省略されています">⚠ ${LIMIT}件以降は表示されません</span>`
        : '';

      const dash = `<span style="color:var(--text-dim)">－</span>`;
      const commentCell  = isUserSearch ? dash : `${cntComments.toLocaleString()}${truncMark('comments')}`;
      const subtitleCell = isUserSearch ? dash : `${cntSubtitles.toLocaleString()}${truncMark('subtitles')}`;

      container.innerHTML = `
      <div class="results-header">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:12px;">
          <table class="count-table">
            <thead><tr>
              <th style="color:#8dcf8d">コメント</th>
              <th style="color:#d4956a">チャット</th>
              <th style="color:#7bb8e8">字幕</th>
              <th style="color:var(--gold)">合計</th>
              <th style="color:var(--text-dim)">動画</th>
            </tr></thead>
            <tbody><tr>
              <td style="color:#8dcf8d">${commentCell}</td>
              <td style="color:#d4956a">${cntChat.toLocaleString()}${truncMark('chat')}</td>
              <td style="color:#7bb8e8">${subtitleCell}</td>
              <td style="color:var(--gold)">${cntTotal.toLocaleString()}</td>
              <td style="color:var(--text-dim)">${groups.length}</td>
            </tr></tbody>
          </table>
          ${truncAnyHtml}
        </div>
        <div class="results-meta" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          ${metaHtml}
          <button class="share-btn share-btn-large" onclick="shareCurrentSearch(this)" title="この検索条件のURLをコピー">🔗 共有</button>
        </div>
      </div>`;

      groups.forEach((group, gIdx) => {
        const groupEl = document.createElement('div');
        groupEl.className = 'video-group';
        groupEl.style.animationDelay = `${Math.min(gIdx * 50, 400)}ms`;
        const href = `https://www.youtube.com/watch?v=${escHtml(group.videoId)}`;
        const thumb = `https://img.youtube.com/vi/${escHtml(group.videoId)}/mqdefault.jpg`;
        const dateStr = normalizeDateDisplay(group.date);
        groupEl.innerHTML = `
        <div class="video-group-header">
          <a href="${href}" target="_blank" class="video-thumb"><img src="${thumb}" alt="" loading="lazy"></a>
          <div class="video-info">
            <span class="video-date">📅 ${escHtml(dateStr)}</span>
            <a class="video-title-link" href="${href}" target="_blank">🎬 ${escHtml(group.title)}</a>
          </div>
          <button class="share-btn" style="align-self:flex-start;margin-left:auto;" onclick="shareVideoSearch('${escHtml(dateStr)}', this)" title="この動画の日付で検索URLをコピー">🔗</button>
        </div>`;

        group.hits.forEach(item => {
          const ts = normalizeTimestamp(item.timestamp);
          const tsUrl = ts ? `${href}&t=${toSeconds(ts)}s` : null;
          const tsHtml = tsUrl
            ? `<div class="hit-ts"><a href="${tsUrl}" target="_blank">⏱${escHtml(ts)}</a></div>`
            : `<div class="hit-ts"></div>`;
          const row = document.createElement('div');
          row.className = 'hit-row';
          row.innerHTML = `${tsHtml}
          <div class="hit-source ${sourceClass(item)}">${sourceLabel(item)}</div>
          <div class="hit-text">${highlight(item.text, keyword)}</div>`;
          groupEl.appendChild(row);
        });
        container.appendChild(groupEl);
      });
    }

    // ===== ユーティリティ =====
    function normalizeDateDisplay(dStr) {
      if (!dStr) return '';
      const s = String(dStr).trim();
      if (/^\d{8}/.test(s)) return `${s.substring(0, 4)}-${s.substring(4, 6)}-${s.substring(6, 8)}`;
      return s.substring(0, 10);
    }
    function safeDateValue(dStr) {
      if (!dStr) return 0;
      let s = String(dStr).trim();
      if (/^\d{8}/.test(s)) s = `${s.substring(0, 4)}-${s.substring(4, 6)}-${s.substring(6, 8)}` + s.substring(8);
      s = s.replace(' ', 'T');
      const t = new Date(s).getTime();
      return isNaN(t) ? 0 : t;
    }
    function normalizeTimestamp(ts) {
      if (!ts) return '';
      const s = String(ts).trim();
      if (s.startsWith('-') || s.includes('T') || s.includes('1899')) return '0:00';
      return s;
    }
    function toSeconds(ts) {
      const t = normalizeTimestamp(ts);
      if (!t || t === '0:00') return 0;
      const p = t.split(':').map(Number);
      if (p.length === 2) return p[0] * 60 + p[1];
      if (p.length === 3) return p[0] * 3600 + p[1] * 60 + p[2];
      return 0;
    }
    function highlight(text, kw) {
      const e = escHtml(text);
      if (!kw) return e;
      // キーワードをスペース分割し、各語のかなバリアントをすべてORで結合してハイライト
      const patterns = kw.replace(/　/g, ' ').split(/\s+/).filter(k => k.length > 0)
        .flatMap(k => expandKana(k))
        .map(escRegex);
      if (!patterns.length) return e;
      return e.replace(new RegExp(patterns.join('|'), 'gi'), m => `<mark>${m}</mark>`);
    }
    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function escRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    // ===== 詳細モーダル制御 =====
    async function showDetailModal(videoId, videoTitle, type) {
      const modal = document.getElementById('detailModal');
      const modalType = document.getElementById('modalType');
      const modalTitle = document.getElementById('modalTitle');
      const modalBody = document.getElementById('modalBody');

      const labels = { subtitles: '字幕', comments: 'コメント', livechat: 'LiveChat' };
      modalType.textContent = labels[type] || '';
      modalTitle.textContent = videoTitle;
      modalBody.innerHTML = '<div class="modal-loading"><span class="spinner"></span>読み込み中...</div>';
      modal.classList.add('active');
      document.body.style.overflow = 'hidden'; // 背景スクロール禁止

      try {
        let rows = [];
        if (type === 'subtitles') {
          rows = await d1Action('get_video_subtitles', { videoId });
        } else if (type === 'comments') {
          rows = await d1Action('get_video_comments', { videoId });
        } else if (type === 'livechat') {
          rows = await d1Action('get_video_livechat', { videoId });
          // 文字列ソートだと "1:00:00" < "59:00" になるため、JS側で秒数ソート
          rows.sort((a, b) => toSeconds(a.timestamp) - toSeconds(b.timestamp));
        }

        if (!rows.length) {
          modalBody.innerHTML = '<div class="modal-loading">データがありません</div>';
          return;
        }

        // @有無どちらの表記でもオーナー判定できるようにする
        const isOwnerAuthor = (author) => !!author && author.replace(/^@/, '').toLowerCase() === 'asaxmayo';

        const html = rows.map(r => {
          // ── タイムスタンプ: livechat / subtitles はクリックで動画ジャンプ ──
          // 0:00（動画先頭）も含めてリンク化する
          let tsHtml = '';
          if (r.timestamp) {
            const normalTs = normalizeTimestamp(r.timestamp);
            if (normalTs && (type === 'livechat' || type === 'subtitles')) {
              const sec = toSeconds(normalTs);
              const tsUrl = `https://www.youtube.com/watch?v=${encodeURIComponent(videoId)}&t=${sec}s`;
              tsHtml = `<a href="${tsUrl}" target="_blank" class="modal-item-ts-link">⏱${escHtml(normalTs)}</a>`;
            } else if (normalTs) {
              tsHtml = `<span class="modal-item-ts">${escHtml(normalTs)}</span>`;
            }
          }

          // ── 著者: livechat / comments はオーナー以外プライバシー非表示 ──
          let authorHtml = '';
          if (r.author) {
            if (type === 'livechat' || type === 'comments') {
              if (isOwnerAuthor(r.author)) {
                authorHtml = `<span class="modal-item-author" style="color:#b464ff;font-weight:400">${escHtml(r.author)}</span>`;
              }
              // それ以外は非表示（プライバシー保護）
            } else {
              authorHtml = `<span class="modal-item-author">${escHtml(r.author)}</span>`;
            }
          }

          // ── テキスト色: スーパーチャット=赤、オーナー=紫 ──
          let textStyle = '';
          if (r.type === 'superchat') textStyle = 'color:#ff6464; font-weight:400';
          else if (isOwnerAuthor(r.author)) textStyle = 'color:#b464ff';

          return `
          <div class="modal-item">
            <div class="modal-item-meta">${tsHtml}${authorHtml}</div>
            <div class="modal-item-text"${textStyle ? ` style="${textStyle}"` : ''}>${escHtml(r.text)}</div>
          </div>`;
        }).join('');

        modalBody.innerHTML = html;
      } catch (e) {
        modalBody.innerHTML = `<div class="modal-loading" style="color:#e88">読み込み失敗: ${escHtml(e.message)}</div>`;
      }
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('active');
      document.body.style.overflow = '';
    }

    // モデレーター関係のラベル表示を修正
    function sourceClass(item) {
      if (item.type === 'superchat') return 'superchat';
      if (item.role === 'OWNER' || item.role === 'MODERATOR') return 'moderator'; // 紫枠で表示
      if (item.source === 'Subtitles') return 'subtitles';
      if (item.source === 'Comments') return 'comments';
      return 'chat';
    }
    function sourceLabel(item) {
      if (item.role === 'OWNER') return '★';
      if (item.type === 'superchat') return 'SUPER';
      if (item.role === 'MODERATOR') return 'チャット'; // 文字列はチャットにする
      if (item.source === 'Subtitles') return '字幕';
      if (item.source === 'Comments') return 'コメント';
      return 'チャット';
    }

    // ===== ハイライトグラフモーダル制御 =====
    let chartInstance = null;
    let currentHighlightVideoId = null;
    let currentHighlightData = null;

    async function showHighlightGraph(videoId, videoTitle) {
      const modal = document.getElementById('highlightModal');
      const titleEl = document.getElementById('highlightModalTitle');
      const bodyEl = document.getElementById('highlightModalBody');
      
      titleEl.textContent = videoTitle;
      currentHighlightVideoId = videoId;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';

      bodyEl.innerHTML = '<div class="modal-loading" id="graphLoading"><span class="spinner"></span>データ取得・集計中...</div><div style="position:relative; width:100%; height:100%;"><canvas id="highlightChartCtx" style="display:none;"></canvas></div>';

      try {
        const rows = await d1Action('get_video_livechat', { videoId });
        currentHighlightData = rows;
        if (!rows.length) {
          bodyEl.innerHTML = '<div class="modal-loading">チャットデータがありません</div>';
          return;
        }

        renderHighlightChart();
      } catch (e) {
        bodyEl.innerHTML = `<div class="modal-loading" style="color:#e88">読み込み失敗: ${escHtml(e.message)}</div>`;
      }
    }

    function renderHighlightChart() {
      if (!currentHighlightData || !currentHighlightData.length) return;

      const interval = parseInt(document.getElementById('highlightIntervalSelect').value, 10);
      const chartType = document.getElementById('highlightTypeSelect').value;

      const regex = /[wｗ笑草]+|:_草まよ:/i;
      let maxSeconds = 0;
      
      const parsedRows = currentHighlightData.map(r => {
        const sec = toSeconds(r.timestamp);
        if (sec > maxSeconds) maxSeconds = sec;
        return { sec, text: r.text };
      });

      const numBins = Math.floor(maxSeconds / interval) + 1;
      const bins = new Array(numBins).fill(0);

      parsedRows.forEach(r => {
        if (regex.test(r.text)) {
          const binIdx = Math.floor(r.sec / interval);
          if (binIdx >= 0 && binIdx < numBins) {
            bins[binIdx]++;
          }
        }
      });

      const labels = [];
      const intervalMins = interval / 60;
      const formatMinToTime = (m) => {
        const hh = Math.floor(m / 60);
        const mm = Math.floor(m % 60);
        return hh > 0 ? `${hh}:${String(mm).padStart(2, '0')}:00` : `${mm}:00`;
      };

      for (let i = 0; i < numBins; i++) {
        const mins = i * intervalMins;
        labels.push(formatMinToTime(mins));
      }

      const loadingEl = document.getElementById('graphLoading');
      if (loadingEl) loadingEl.style.display = 'none';
      const canvas = document.getElementById('highlightChartCtx');
      if (canvas) canvas.style.display = 'block';

      if (chartInstance) {
        chartInstance.destroy();
      }

      const isLine = chartType === 'line';

      chartInstance = new Chart(canvas, {
        type: chartType,
        data: {
          labels: labels,
          datasets: [{
            label: '草カウント',
            data: bins,
            tension: isLine ? 0.4 : 0.1,
            fill: isLine,
            backgroundColor: isLine ? 'rgba(200, 169, 110, 0.2)' : 'rgba(200, 169, 110, 0.8)',
            borderColor: 'rgba(200, 169, 110, 1)',
            borderWidth: isLine ? 2 : 1,
            pointBackgroundColor: 'rgba(200, 169, 110, 1)',
            pointRadius: isLine ? 2 : 0,
            pointHoverRadius: isLine ? 4 : 0,
            hoverBackgroundColor: !isLine ? 'rgba(255, 210, 0, 0.9)' : undefined
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              ticks: { color: '#8a8070' },
              grid: { color: 'rgba(200, 169, 110, 0.1)' }
            },
            y: {
              beginAtZero: true,
              ticks: { stepSize: 1, color: '#8a8070' },
              grid: { color: 'rgba(200, 169, 110, 0.1)' }
            }
          },
          plugins: {
            legend: {
              labels: { color: '#e8e0d0', font: { family: "'Noto Sans JP', sans-serif" } }
            },
            tooltip: {
              callbacks: {
                title: function(context) {
                  const idx = context[0].dataIndex;
                  const startMin = idx * intervalMins;
                  const endMin = startMin + intervalMins;
                  return `${formatMinToTime(startMin)} ～ ${formatMinToTime(endMin)}`;
                }
              }
            },
            zoom: {
              pan: {
                enabled: true,
                mode: 'x'
              },
              zoom: {
                wheel: { enabled: true },
                drag: { enabled: true, backgroundColor: 'rgba(200, 169, 110, 0.2)' },
                pinch: { enabled: true },
                mode: 'x'
              }
            }
          },
          onHover: (event, activeEls) => {
            event.native.target.style.cursor = activeEls.length > 0 ? 'pointer' : 'default';
          },
          onClick: (e, activeEls) => {
            if (activeEls.length > 0) {
              const idx = activeEls[0].index;
              const startTime = idx * interval;
              const url = `https://www.youtube.com/watch?v=${currentHighlightVideoId}&t=${startTime}s`;
              window.open(url, '_blank');
            }
          }
        }
      });
    }

    function closeHighlightModal() {
      document.getElementById('highlightModal').classList.remove('active');
      document.body.style.overflow = '';
      if (chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
      }
    }
  </script>
